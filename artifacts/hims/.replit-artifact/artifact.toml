kind = "web"
previewPath = "/"
title = "HIMS — Hospital Information Management System"
version = "1.0.0"
id = "artifacts/hims"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21597

[services.development]
run = "pnpm --filter @workspace/hims run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hims", "run", "build" ]
publicDir = "artifacts/hims/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21597"
BASE_PATH = "/"
